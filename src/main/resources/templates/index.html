<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Matchmaker - Find Your Perfect Ride</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        surface: {
                            900: '#0a0e17',
                            800: '#111827',
                            700: '#1a2234',
                        },
                        accent: {
                            DEFAULT: '#06b6d4',
                            glow: '#22d3ee',
                        }
                    },
                    boxShadow: {
                        'glow': '0 0 40px rgba(6, 182, 212, 0.15)',
                        'glow-lg': '0 0 60px rgba(6, 182, 212, 0.25)',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-surface-900 text-gray-100 font-sans antialiased">

    <!-- Background effects -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-cyan-400/5 rounded-full blur-3xl"></div>
    </div>

    <main class="relative flex min-h-screen flex-col items-center justify-center px-4 py-12 sm:px-6 lg:px-8">

        <!-- Header -->
        <header class="text-center mb-10 sm:mb-12 max-w-2xl">
            <div class="inline-flex items-center gap-2 rounded-full border border-cyan-500/20 bg-cyan-500/10 px-4 py-1.5 text-xs font-medium tracking-widest uppercase text-cyan-400 mb-6">
                <span class="relative flex h-2 w-2">
                    <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-cyan-400 opacity-75"></span>
                    <span class="relative inline-flex h-2 w-2 rounded-full bg-cyan-400"></span>
                </span>
                Smart Car Recommendations
            </div>
            <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold tracking-tight text-white leading-tight">
                Car Matchmaker
                <span class="block mt-1 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    Find Your Perfect Ride
                </span>
            </h1>
            <p class="mt-5 text-base sm:text-lg text-gray-400 leading-relaxed max-w-xl mx-auto">
                Overwhelmed by endless options? Tell us your budget and what matters most — we'll cut through the noise and surface the top 3 cars built for you.
            </p>
        </header>

        <!-- Form card -->
        <div class="w-full max-w-md">
            <form action="/recommend" method="post"
                  class="rounded-2xl border border-white/10 bg-surface-800/80 backdrop-blur-xl p-6 sm:p-8 shadow-glow-lg">

                <div class="space-y-6">

                    <!-- Budget input -->
                    <div>
                        <label for="maxBudget" class="block text-sm font-semibold text-gray-200 mb-2">
                            Maximum Budget (in ₹)
                        </label>
                        <div class="relative">
                            <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500 font-medium">₹</span>
                            <input type="number"
                                   id="maxBudget"
                                   name="maxBudget"
                                   min="0"
                                   step="10000"
                                   placeholder="e.g. 1000000"
                                   required
                                   class="w-full rounded-xl border border-white/10 bg-surface-700/60 py-3.5 pl-9 pr-4 text-white placeholder-gray-500 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                        </div>
                    </div>

                    <!-- Priority select -->
                    <div>
                        <label for="topPriority" class="block text-sm font-semibold text-gray-200 mb-2">
                            What matters most to you?
                        </label>
                        <div class="relative">
                            <select id="topPriority"
                                    name="topPriority"
                                    required
                                    class="w-full appearance-none rounded-xl border border-white/10 bg-surface-700/60 py-3.5 pl-4 pr-10 text-white outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                                <option value="safety">Safety First</option>
                                <option value="mileage">Fuel Efficiency</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Submit button -->
                    <button type="submit"
                            class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 py-4 px-6 text-base font-bold text-white shadow-lg shadow-cyan-500/25 transition-all duration-300 hover:shadow-cyan-500/40 hover:scale-[1.02] active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:ring-offset-2 focus:ring-offset-surface-800">
                        <span class="relative z-10 flex items-center justify-center gap-2">
                            Find My Matches
                            <svg class="h-5 w-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                            </svg>
                        </span>
                        <div class="absolute inset-0 bg-gradient-to-r from-cyan-400 to-blue-500 opacity-0 transition-opacity group-hover:opacity-100"></div>
                    </button>

                </div>
            </form>

            <p class="mt-6 text-center text-xs text-gray-600">
                Powered by smart filtering &amp; ranking · Top 3 matches in seconds
            </p>
        </div>

    </main>

</body>
</html>
